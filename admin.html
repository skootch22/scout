<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Admin – Tournament Rules</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800&family=Barlow:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --navy:    #0a1628;
      --navy2:   #112240;
      --card-bg: #162033;
      --border:  #1e3054;
      --primary: #38bdf8;
      --primary2:#0ea5e9;
      --gold:    #f5a623;
      --light:   #e8edf5;
      --muted:   #8899b0;
      --red:     #e03e3e;
      --green:   #48bb78;
      --radius:  10px;
      --header-gradient: linear-gradient(135deg, #0a1628 0%, #0d2a4a 60%, #0e3d6e 100%);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--navy);
      color: var(--light);
      font-family: 'Barlow', sans-serif;
      font-size: 16px;
      min-height: 100vh;
      padding-bottom: 4rem;
    }

    /* ── HEADER ── */
    header {
      background: var(--header-gradient);
      border-bottom: 3px solid var(--primary);
      padding: 1.2rem 1.4rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
      position: relative;
      overflow: hidden;
    }
    header::before {
      content: '';
      position: absolute;
      inset: 0;
      background: repeating-linear-gradient(
        -45deg, transparent, transparent 18px,
        rgba(255,255,255,.018) 18px, rgba(255,255,255,.018) 19px
      );
    }
    header h1 {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: clamp(1.2rem, 4vw, 1.7rem);
      font-weight: 800;
      letter-spacing: .06em;
      text-transform: uppercase;
      color: #fff;
      position: relative;
    }
    header h1 span { color: var(--primary); }
    .header-actions { display: flex; gap: .6rem; align-items: center; position: relative; }
    .btn-back {
      background: transparent;
      color: var(--muted);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: .45rem .9rem;
      font-family: 'Barlow Condensed', sans-serif;
      font-size: .85rem;
      font-weight: 700;
      letter-spacing: .07em;
      text-transform: uppercase;
      cursor: pointer;
      text-decoration: none;
      transition: color .2s, border-color .2s;
    }
    .btn-back:hover { color: var(--light); border-color: var(--muted); }
    .btn-logout {
      background: transparent;
      color: var(--primary);
      border: 1px solid var(--primary);
      border-radius: var(--radius);
      padding: .45rem .9rem;
      font-family: 'Barlow Condensed', sans-serif;
      font-size: .85rem;
      font-weight: 700;
      letter-spacing: .07em;
      text-transform: uppercase;
      cursor: pointer;
      transition: background .2s, color .2s;
    }
    .btn-logout:hover { background: var(--primary); color: #fff; }

    /* ── LOGIN SCREEN ── */
    #login-screen {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: calc(100vh - 80px);
      padding: 2rem 1rem;
    }
    .login-card {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 2rem;
      width: 100%;
      max-width: 360px;
      text-align: center;
    }
    .login-card .lock-icon { font-size: 2.5rem; margin-bottom: 1rem; }
    .login-card h2 {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 1.4rem;
      font-weight: 800;
      letter-spacing: .06em;
      text-transform: uppercase;
      margin-bottom: .35rem;
    }
    .login-card p { color: var(--muted); font-size: .85rem; margin-bottom: 1.5rem; }
    .login-card input {
      width: 100%;
      background: var(--navy);
      color: var(--light);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: .75rem 1rem;
      font-family: 'Barlow', sans-serif;
      font-size: 1rem;
      margin-bottom: .75rem;
      transition: border-color .2s;
    }
    .login-card input:focus { outline: none; border-color: var(--primary); }
    .login-error { color: var(--red); font-size: .85rem; margin-bottom: .75rem; min-height: 1.2em; }

    /* ── MAIN CONTENT ── */
    #admin-screen { display: none; }
    .main-wrap {
      max-width: 780px;
      margin: 0 auto;
      padding: 1.8rem 1rem 0;
    }

    /* ── TOURNAMENT LIST ── */
    .section-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 1rem;
    }
    .section-title {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 1rem;
      font-weight: 700;
      letter-spacing: .1em;
      text-transform: uppercase;
      color: var(--muted);
    }

    .btn-primary {
      background: var(--primary);
      color: var(--primary-text, #fff);
      border: none;
      border-radius: var(--radius);
      padding: .55rem 1.1rem;
      font-family: 'Barlow Condensed', sans-serif;
      font-size: .9rem;
      font-weight: 700;
      letter-spacing: .07em;
      text-transform: uppercase;
      cursor: pointer;
      transition: background .2s, transform .1s;
      white-space: nowrap;
    }
    .btn-primary:hover  { background: var(--primary2); }
    .btn-primary:active { transform: scale(.97); }

    .btn-secondary {
      background: transparent;
      color: var(--light);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: .5rem 1rem;
      font-family: 'Barlow Condensed', sans-serif;
      font-size: .85rem;
      font-weight: 700;
      letter-spacing: .07em;
      text-transform: uppercase;
      cursor: pointer;
      transition: border-color .2s, color .2s;
    }
    .btn-secondary:hover { border-color: var(--muted); color: var(--light); }

    .btn-danger {
      background: transparent;
      color: var(--red);
      border: 1px solid rgba(224,62,62,.35);
      border-radius: var(--radius);
      padding: .5rem 1rem;
      font-family: 'Barlow Condensed', sans-serif;
      font-size: .85rem;
      font-weight: 700;
      letter-spacing: .07em;
      text-transform: uppercase;
      cursor: pointer;
      transition: background .2s, color .2s;
    }
    .btn-danger:hover { background: var(--red); color: #fff; }

    /* Tournament rows */
    #tournament-list { display: flex; flex-direction: column; gap: .6rem; margin-bottom: 2rem; }
    .t-row {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: .85rem 1rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: .75rem;
      transition: border-color .2s;
    }
    .t-row:hover { border-color: #3a2525; }
    .t-row-info { flex: 1; min-width: 0; }
    .t-row-name {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 1.05rem;
      font-weight: 700;
      color: var(--light);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .t-row-meta { font-size: .75rem; color: var(--muted); margin-top: .15rem; }
    .t-row-badges { display: flex; align-items: center; gap: .35rem; margin-top: .3rem; flex-wrap: wrap; }
    .badge-active {
      display: inline-block;
      background: rgba(72,187,120,.12);
      color: var(--green);
      border: 1px solid rgba(72,187,120,.3);
      border-radius: 20px;
      padding: .1rem .5rem;
      font-size: .7rem;
      font-weight: 700;
      letter-spacing: .06em;
      text-transform: uppercase;
    }
    .badge-inactive {
      display: inline-block;
      background: rgba(136,153,176,.1);
      color: var(--muted);
      border: 1px solid rgba(136,153,176,.2);
      border-radius: 20px;
      padding: .1rem .5rem;
      font-size: .7rem;
      font-weight: 700;
      letter-spacing: .06em;
      text-transform: uppercase;
    }
    .t-row-actions { display: flex; gap: .5rem; flex-shrink: 0; }

    .empty-state {
      text-align: center;
      padding: 3rem 1rem;
      color: var(--muted);
      background: var(--card-bg);
      border: 1px dashed var(--border);
      border-radius: var(--radius);
    }
    .empty-state .es-icon { font-size: 2rem; margin-bottom: .75rem; }
    .empty-state p { font-size: .9rem; }

    /* ── FORM PANEL ── */
    #form-panel {
      display: none;
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1.4rem;
      margin-bottom: 2rem;
      animation: fadeUp .25s ease both;
    }
    @keyframes fadeUp {
      from { opacity:0; transform:translateY(10px); }
      to   { opacity:1; transform:translateY(0); }
    }
    .form-title {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 1.1rem;
      font-weight: 800;
      letter-spacing: .06em;
      text-transform: uppercase;
      color: var(--primary);
      margin-bottom: 1.2rem;
      padding-bottom: .75rem;
      border-bottom: 1px solid var(--border);
    }

    .form-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1rem;
    }
    @media (max-width: 560px) { .form-grid { grid-template-columns: 1fr; } }
    .form-group { display: flex; flex-direction: column; gap: .35rem; }
    .form-group.full { grid-column: 1 / -1; }

    .form-group label {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: .72rem;
      font-weight: 700;
      letter-spacing: .1em;
      text-transform: uppercase;
      color: var(--muted);
    }
    .form-group label .required { color: var(--primary); margin-left: .2rem; }
    .form-group label .hint {
      font-weight: 400;
      letter-spacing: 0;
      text-transform: none;
      color: var(--muted);
      font-size: .7rem;
      margin-left: .3rem;
    }

    .form-group input,
    .form-group select,
    .form-group textarea {
      background: var(--navy);
      color: var(--light);
      border: 1px solid var(--border);
      border-radius: 7px;
      padding: .6rem .85rem;
      font-family: 'Barlow', sans-serif;
      font-size: .92rem;
      transition: border-color .2s;
      width: 100%;
    }
    .form-group input:focus,
    .form-group select:focus,
    .form-group textarea:focus { outline: none; border-color: var(--primary); }
    .form-group textarea { resize: vertical; min-height: 90px; line-height: 1.5; }
    .form-group select { cursor: pointer; }

    /* checkbox for Active */
    .checkbox-row {
      display: flex;
      align-items: center;
      gap: .6rem;
      padding: .6rem 0;
    }
    .checkbox-row input[type=checkbox] {
      width: 18px; height: 18px;
      accent-color: var(--primary);
      cursor: pointer;
      flex-shrink: 0;
    }
    .checkbox-row label {
      font-size: .92rem;
      color: var(--light);
      cursor: pointer;
      font-family: 'Barlow', sans-serif;
      font-weight: 500;
      letter-spacing: 0;
      text-transform: none;
    }

    .form-section-divider {
      grid-column: 1 / -1;
      border: none;
      border-top: 1px solid var(--border);
      margin: .25rem 0;
    }
    .form-section-label {
      grid-column: 1 / -1;
      font-family: 'Barlow Condensed', sans-serif;
      font-size: .75rem;
      font-weight: 700;
      letter-spacing: .12em;
      text-transform: uppercase;
      color: var(--primary);
      margin-bottom: -.25rem;
    }

    .form-actions {
      display: flex;
      gap: .75rem;
      justify-content: flex-end;
      margin-top: 1.4rem;
      padding-top: 1rem;
      border-top: 1px solid var(--border);
      flex-wrap: wrap;
    }

    /* ── STATUS / TOAST ── */
    #toast {
      position: fixed;
      bottom: 1.5rem;
      left: 50%;
      transform: translateX(-50%) translateY(80px);
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: .75rem 1.4rem;
      font-size: .9rem;
      font-weight: 600;
      color: var(--light);
      box-shadow: 0 8px 32px rgba(0,0,0,.5);
      transition: transform .3s ease, opacity .3s ease;
      opacity: 0;
      z-index: 999;
      white-space: nowrap;
    }
    #toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }
    #toast.success { border-color: rgba(72,187,120,.5); color: var(--green); }
    #toast.error   { border-color: rgba(224,62,62,.5);  color: var(--red); }

    /* ── DELETE CONFIRM ── */
    #confirm-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,.7);
      z-index: 500;
      align-items: center;
      justify-content: center;
      padding: 1rem;
    }
    #confirm-overlay.show { display: flex; }
    .confirm-card {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1.8rem;
      max-width: 380px;
      width: 100%;
      text-align: center;
    }
    .confirm-card .confirm-icon { font-size: 2rem; margin-bottom: .75rem; }
    .confirm-card h3 {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 1.2rem;
      font-weight: 800;
      letter-spacing: .05em;
      text-transform: uppercase;
      margin-bottom: .5rem;
    }
    .confirm-card p { color: var(--muted); font-size: .88rem; margin-bottom: 1.4rem; line-height: 1.5; }
    .confirm-actions { display: flex; gap: .75rem; justify-content: center; }

    .loading-row {
      text-align: center;
      padding: 2rem;
      color: var(--muted);
      font-size: .9rem;
    }

    footer {
      text-align: center;
      margin-top: 3rem;
      padding-bottom: 2rem;
    }
    .footer-brand {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: .5rem;
    }
    .footer-brand img {
      height: 60px;
      width: auto;
      opacity: .45;
      transition: opacity .2s;
    }
    .footer-brand img:hover { opacity: .75; }
    .footer-brand span {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: .8rem;
      font-weight: 700;
      letter-spacing: .12em;
      text-transform: uppercase;
      color: var(--muted);
      opacity: .6;
    }
  </style>
</head>
<body>

<header>
  <h1>Rules<span>HQ</span> &nbsp;Admin</h1>
  <div class="header-actions">
    <a href="index.html" class="btn-back">← View App</a>
    <button class="btn-logout" id="btn-logout" style="display:none;">Log Out</button>
  </div>
</header>

<!-- LOGIN -->
<div id="login-screen">
  <div class="login-card">
    <div class="lock-icon">🔐</div>
    <h2>Admin Access</h2>
    <p>Sign in with your admin email and password.</p>
    <div class="login-error" id="login-error"></div>
    <input type="email"    id="email-input"    placeholder="Email"    autocomplete="email" />
    <input type="password" id="password-input" placeholder="Password" autocomplete="current-password" />
    <button class="btn-primary" id="btn-login" style="width:100%;">Log In</button>
  </div>
</div>

<!-- ADMIN -->
<div id="admin-screen">
  <div class="main-wrap">

    <div class="section-header">
      <span class="section-title">Tournaments</span>
      <button class="btn-primary" id="btn-add">+ Add Tournament</button>
    </div>

    <!-- Form -->
    <div id="form-panel">
      <div class="form-title" id="form-title">Add Tournament</div>
      <div class="form-grid">

        <div class="form-section-label">Basic Info</div>

        <div class="form-group full">
          <label>Tournament Name <span class="required">*</span></label>
          <input type="text" id="f-tournament" placeholder="e.g. Capital Cup" />
        </div>

        <div class="form-group">
          <label>Location <span class="hint">city / park name</span></label>
          <input type="text" id="f-location" placeholder="e.g. Lou Berliner Sports Park, Columbus, OH" />
        </div>

        <div class="form-group">
          <label>Field Address <span class="hint">for maps link</span></label>
          <input type="text" id="f-field-address" placeholder="e.g. 325 Greenlawn Ave, Columbus, OH" />
        </div>

        <div class="form-group">
          <label>Start Date</label>
          <input type="date" id="f-start-date" />
        </div>

        <div class="form-group">
          <label>End Date</label>
          <input type="date" id="f-end-date" />
        </div>

        <div class="form-group">
          <label>Tournament URL</label>
          <input type="url" id="f-tournament-url" placeholder="https://..." />
        </div>

        <div class="form-group">
          <label>Rules URL</label>
          <input type="url" id="f-rules-url" placeholder="https://..." />
        </div>

        <div class="form-group">
          <label>Number of Teams</label>
          <input type="number" id="f-num-teams" placeholder="e.g. 16" min="1" />
        </div>

        <div class="form-group">
          <label>Guaranteed Games</label>
          <input type="number" id="f-guaranteed-games" placeholder="e.g. 3" min="1" />
        </div>

        <div class="form-group">
          <label>Gate Fee</label>
          <input type="text" id="f-gate-fee" placeholder="e.g. $5/person" />
        </div>

        <div class="form-group full checkbox-row">
          <input type="checkbox" id="f-active" checked />
          <label for="f-active">Active (visible in app)</label>
        </div>

        <hr class="form-section-divider" />
        <div class="form-section-label">Game Rules</div>

        <div class="form-group">
          <label>Innings</label>
          <input type="number" id="f-innings" placeholder="e.g. 6" min="1" max="9" />
        </div>

        <div class="form-group">
          <label>Time Limit</label>
          <input type="text" id="f-time-limit" placeholder="e.g. 1:40" />
        </div>

        <div class="form-group">
          <label>Balks</label>
          <select id="f-balks">
            <option value="">— Not specified —</option>
            <option value="Not Enforced">Not Enforced</option>
            <option value="Warned Then Enforced">Warned Then Enforced</option>
            <option value="Enforced">Enforced</option>
            <option value="Enforced (Reduced Rules)">Enforced (Reduced Rules)</option>
          </select>
        </div>

        <div class="form-group">
          <label>Courtesy Runner</label>
          <select id="f-courtesy-runner">
            <option value="">— Not specified —</option>
            <option value="Pitcher/Catcher Any Time">Pitcher/Catcher Any Time</option>
            <option value="Pitcher/Catcher After 2 Outs">Pitcher/Catcher After 2 Outs</option>
            <option value="Not Allowed">Not Allowed</option>
          </select>
        </div>

        <div class="form-group">
          <label>Field Type</label>
          <select id="f-field-type">
            <option value="">— Not specified —</option>
            <option value="Turf">Turf</option>
            <option value="Dirt">Dirt</option>
            <option value="Mixed">Mixed</option>
          </select>
        </div>

        <div class="form-group full checkbox-row">
          <input type="checkbox" id="f-dropped-third" />
          <label for="f-dropped-third">Dropped Third Strike allowed</label>
        </div>

        <div class="form-group full">
          <label>Mercy Rule <span class="hint">markdown supported</span></label>
          <textarea id="f-mercy-rule" placeholder="e.g.&#10;- 15 after 3&#10;- 10 after 4&#10;- 8 after 5"></textarea>
        </div>

        <div class="form-group full">
          <label>Pitching Limits</label>
          <textarea id="f-pitching-limits" placeholder="e.g. 3 innings per day to pitch the next day. 6 max in one day."></textarea>
        </div>

        <div class="form-group full">
          <label>Extra Innings <span class="hint">markdown supported</span></label>
          <textarea id="f-extra-innings" placeholder="e.g. International tiebreaker starting in the 7th"></textarea>
        </div>

        <div class="form-group full">
          <label>Tie Breakers <span class="hint">markdown supported</span></label>
          <textarea id="f-tie-breakers" placeholder="e.g.&#10;- Winning Percentage&#10;- Head to Head&#10;- Runs Allowed"></textarea>
        </div>

        <div class="form-group full">
          <label>Substitution Rules <span class="hint">markdown supported</span></label>
          <textarea id="f-substitution-rules" placeholder="Describe re-entry and substitution policies..."></textarea>
        </div>

        <div class="form-group full">
          <label>Stealing Rules</label>
          <textarea id="f-stealing-rules" placeholder="e.g. No stealing until the ball crosses home plate"></textarea>
        </div>

        <hr class="form-section-divider" />
        <div class="form-section-label">Hotel (optional)</div>

        <div class="form-group">
          <label>Hotel Name</label>
          <input type="text" id="f-hotel-name" placeholder="e.g. Hilton Garden Inn" />
        </div>

        <div class="form-group">
          <label>Hotel Address <span class="hint">for maps link</span></label>
          <input type="text" id="f-hotel-address" placeholder="e.g. 3928 Jackpot Road, Grove City, OH" />
        </div>

        <div class="form-group full">
          <label>Hotel URL</label>
          <input type="url" id="f-hotel-url" placeholder="https://..." />
        </div>

        <hr class="form-section-divider" />
        <div class="form-section-label">Notes</div>

        <div class="form-group full">
          <label>Notes <span class="hint">markdown supported</span></label>
          <textarea id="f-notes" placeholder="Any additional rules or reminders..."></textarea>
        </div>

      </div><!-- /form-grid -->

      <div class="form-actions">
        <button class="btn-secondary" id="btn-cancel">Cancel</button>
        <button class="btn-primary" id="btn-save">Save Tournament</button>
      </div>
    </div><!-- /form-panel -->

    <!-- Tournament list -->
    <div id="tournament-list">
      <div class="loading-row">Loading tournaments…</div>
    </div>

  </div>
</div>

<!-- Delete confirm overlay -->
<div id="confirm-overlay">
  <div class="confirm-card">
    <div class="confirm-icon">⚠️</div>
    <h3>Delete Tournament?</h3>
    <p id="confirm-msg">This cannot be undone.</p>
    <div class="confirm-actions">
      <button class="btn-secondary" id="btn-confirm-cancel">Cancel</button>
      <button class="btn-danger" id="btn-confirm-delete">Delete</button>
    </div>
  </div>
</div>

<!-- Toast -->
<div id="toast"></div>

<script src="config.js"></script>
<script>
// ── THEMES ────────────────────────────────────────────────────
const THEMES = {
  "original-blue": {

    primary2:       "#0ea5e9",
    navy:           "#0a1628",

  "orange": {

  },
  "black-yellow": {
    primary:        "#facc15",
    primary2:       "#eab308",
    navy:           "#0a0a0a",
    navy2:          "#141400",
    cardBg:         "#111100",
    border:         "#2a2800",
    gold:           "#facc15",
    headerGradient: "linear-gradient(135deg, #0a0a0a 0%, #141200 60%, #1f1c00 100%)",

    muted:          "#666666",
  },

(function applyTheme() {
  const t = typeof CONFIG.THEME === 'string'
    ? THEMES[CONFIG.THEME] || THEMES['original-blue']
    : CONFIG.THEME;
  const r = document.documentElement;
  r.style.setProperty('--primary',          t.primary);
  r.style.setProperty('--primary2',         t.primary2);
  r.style.setProperty('--navy',             t.navy);
  r.style.setProperty('--navy2',            t.navy2);
  r.style.setProperty('--card-bg',          t.cardBg);
  r.style.setProperty('--border',           t.border);
  r.style.setProperty('--gold',             t.gold);
  r.style.setProperty('--header-gradient',  t.headerGradient);
  r.style.setProperty('--primary-text',     t.primaryText || '#ffffff');
  r.style.setProperty('--title-bar-text',   t.titleBarText || '#ffffff');
  if (t.light) r.style.setProperty('--light', t.light);
  if (t.muted) r.style.setProperty('--muted', t.muted);
})();

// ── AUTH ──────────────────────────────────────────────────────
let sbSession = null;

async function getSession() {
  try {
    const res = await fetch(`${CONFIG.SUPABASE_URL}/auth/v1/user`, {
      headers: {
        'apikey':        CONFIG.SUPABASE_ANON_KEY,
        'Authorization': `Bearer ${localStorage.getItem('sb_access_token') || ''}`
      }
    });
    if (!res.ok) return null;
    const user = await res.json();
    return user?.id ? { access_token: localStorage.getItem('sb_access_token'), user } : null;
  } catch { return null; }
}

async function signIn(email, password) {
  const res = await fetch(`${CONFIG.SUPABASE_URL}/auth/v1/token?grant_type=password`, {
    method: 'POST',
    headers: {
      'apikey':       CONFIG.SUPABASE_ANON_KEY,
      'Content-Type': 'application/json'
    },
    body: JSON.stringify({ email, password })
  });
  const data = await res.json();
  if (!res.ok) throw new Error(data.error_description || data.msg || 'Login failed.');
  localStorage.setItem('sb_access_token',  data.access_token);
  localStorage.setItem('sb_refresh_token', data.refresh_token);
  sbSession = data;
  return data;
}

async function signOut() {
  await fetch(`${CONFIG.SUPABASE_URL}/auth/v1/logout`, {
    method: 'POST',
    headers: {
      'apikey':        CONFIG.SUPABASE_ANON_KEY,
      'Authorization': `Bearer ${localStorage.getItem('sb_access_token') || ''}`
    }
  }).catch(() => {});
  localStorage.removeItem('sb_access_token');
  localStorage.removeItem('sb_refresh_token');
  sbSession = null;
  showLogin();
}

function getAuthHeaders() {
  return {
    'apikey':        CONFIG.SUPABASE_ANON_KEY,
    'Authorization': `Bearer ${sbSession?.access_token || localStorage.getItem('sb_access_token') || ''}`,
    'Content-Type':  'application/json',
    'Prefer':        'return=representation'
  };
}

function showLogin() {
  document.getElementById('login-screen').style.display  = 'flex';
  document.getElementById('admin-screen').style.display  = 'none';
  document.getElementById('btn-logout').style.display    = 'none';
  document.getElementById('email-input').value           = '';
  document.getElementById('password-input').value        = '';
  document.getElementById('login-error').textContent     = '';
}

function showAdmin() {
  document.getElementById('login-screen').style.display = 'none';
  document.getElementById('admin-screen').style.display = 'block';
  document.getElementById('btn-logout').style.display   = 'block';
  loadTournaments();
}

// Login events
document.getElementById('btn-login').addEventListener('click', handleLogin);
document.getElementById('email-input').addEventListener('keydown',    e => { if (e.key === 'Enter') document.getElementById('password-input').focus(); });
document.getElementById('password-input').addEventListener('keydown', e => { if (e.key === 'Enter') handleLogin(); });

async function handleLogin() {
  const email = document.getElementById('email-input').value.trim();
  const pw    = document.getElementById('password-input').value;
  const err   = document.getElementById('login-error');
  const btn   = document.getElementById('btn-login');
  if (!email || !pw) { err.textContent = 'Please enter your email and password.'; return; }
  btn.disabled = true;
  btn.textContent = 'Signing in…';
  err.textContent = '';
  try {
    await signIn(email, pw);
    showAdmin();
  } catch (e) {
    err.textContent = e.message;
    document.getElementById('password-input').value = '';
    document.getElementById('password-input').focus();
  } finally {
    btn.disabled = false;
    btn.textContent = 'Log In';
  }
}

document.getElementById('btn-logout').addEventListener('click', signOut);

// ── SUPABASE HELPERS ──────────────────────────────────────────
async function sbFetch(path, options = {}) {
  const res = await fetch(`${CONFIG.SUPABASE_URL}/rest/v1/${path}`, {
    headers: getAuthHeaders(),
    ...options
  });
  if (!res.ok) {
    const err = await res.json().catch(() => ({}));
    throw new Error(err.message || `HTTP ${res.status}`);
  }
  const text = await res.text();
  return text ? JSON.parse(text) : null;
}

// ── DATA ──────────────────────────────────────────────────────
let allTournaments = [];
let editingId = null;
let pendingDeleteId = null;

async function loadTournaments() {
  const list = document.getElementById('tournament-list');
  list.innerHTML = '<div class="loading-row">Loading tournaments…</div>';
  try {
    allTournaments = await sbFetch(
      `tournaments?team_id=eq.${CONFIG.TEAM_ID}&order=start_date.asc`
    );
    renderList();
  } catch (err) {
    list.innerHTML = `<div class="loading-row" style="color:var(--red)">⚠ ${err.message}</div>`;
  }
}

function renderList() {
  const list = document.getElementById('tournament-list');
  if (!allTournaments.length) {
    list.innerHTML = `
      <div class="empty-state">
        <div class="es-icon">🏆</div>
        <p>No tournaments yet. Click <strong>+ Add Tournament</strong> to get started.</p>
      </div>`;
    return;
  }
  list.innerHTML = allTournaments.map(t => `
    <div class="t-row">
      <div class="t-row-info">
        <div class="t-row-name">${escapeHTML(t.tournament)}</div>
        <div class="t-row-meta">${t.location ? escapeHTML(t.location) + ' · ' : ''}${formatDateRange(t.start_date, t.end_date)}</div>
        <div class="t-row-badges">
          <span class="${t.active ? 'badge-active' : 'badge-inactive'}">${t.active ? 'Active' : 'Inactive'}</span>
        </div>
      </div>
      <div class="t-row-actions">
        <button class="btn-secondary" onclick="openEdit('${t.id}')">Edit</button>
        <button class="btn-danger"    onclick="confirmDelete('${t.id}', '${escapeAttr(t.tournament)}')">Delete</button>
      </div>
    </div>
  `).join('');
}

function formatDateRange(start, end) {
  if (!start && !end) return 'No dates set';
  const fmt = d => new Date(d + 'T12:00:00').toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
  if (start && end && start !== end) return `${fmt(start)} → ${fmt(end)}`;
  return fmt(start || end);
}

// ── FORM ──────────────────────────────────────────────────────
const FIELDS = [
  ['f-tournament',       'tournament',        'text'],
  ['f-location',         'location',          'text'],
  ['f-field-address',    'field_address',     'text'],
  ['f-start-date',       'start_date',        'text'],
  ['f-end-date',         'end_date',          'text'],
  ['f-tournament-url',   'tournament_url',    'text'],
  ['f-rules-url',        'rules_url',         'text'],
  ['f-num-teams',        'num_teams',         'int'],
  ['f-guaranteed-games', 'guaranteed_games',  'int'],
  ['f-gate-fee',         'gate_fee',          'text'],
  ['f-active',           'active',            'bool'],
  ['f-innings',          'innings',           'int'],
  ['f-time-limit',       'time_limit',        'text'],
  ['f-balks',            'balks',             'text'],
  ['f-courtesy-runner',  'courtesy_runner',   'text'],
  ['f-field-type',       'field_type',        'text'],
  ['f-dropped-third',    'dropped_third_strike','bool'],
  ['f-mercy-rule',       'mercy_rule',        'text'],
  ['f-pitching-limits',  'pitching_limits',   'text'],
  ['f-extra-innings',    'extra_innings',     'text'],
  ['f-tie-breakers',     'tie_breakers',      'text'],
  ['f-substitution-rules','substitution_rules','text'],
  ['f-stealing-rules',   'stealing_rules',    'text'],
  ['f-hotel-name',       'hotel_name',        'text'],
  ['f-hotel-address',    'hotel_address',     'text'],
  ['f-hotel-url',        'hotel_url',         'text'],
  ['f-notes',            'notes',             'text'],
];

function getEl(id) { return document.getElementById(id); }

function clearForm() {
  FIELDS.forEach(([elId, , type]) => {
    const el = getEl(elId);
    if (!el) return;
    if (type === 'bool') el.checked = elId === 'f-active'; // active defaults to true
    else el.value = '';
  });
}

function formFromRecord(t) {
  FIELDS.forEach(([elId, col, type]) => {
    const el = getEl(elId);
    if (!el) return;
    const val = t[col];
    if (type === 'bool') el.checked = !!val;
    else el.value = val ?? '';
  });
}

function recordFromForm() {
  const rec = { team_id: CONFIG.TEAM_ID };
  FIELDS.forEach(([elId, col, type]) => {
    const el = getEl(elId);
    if (!el) return;
    if (type === 'bool')  rec[col] = el.checked;
    else if (type === 'int') rec[col] = el.value ? parseInt(el.value, 10) : null;
    else rec[col] = el.value.trim() || null;
  });
  return rec;
}

function openAdd() {
  editingId = null;
  clearForm();
  getEl('form-title').textContent = 'Add Tournament';
  getEl('btn-save').textContent = 'Save Tournament';
  showForm();
}

function openEdit(id) {
  const t = allTournaments.find(x => x.id === id);
  if (!t) return;
  editingId = id;
  formFromRecord(t);
  getEl('form-title').textContent = 'Edit Tournament';
  getEl('btn-save').textContent = 'Save Changes';
  showForm();
}

function showForm() {
  const panel = getEl('form-panel');
  panel.style.display = 'block';
  panel.style.animation = 'none';
  panel.offsetHeight;
  panel.style.animation = '';
  panel.scrollIntoView({ behavior: 'smooth', block: 'start' });
}

function hideForm() {
  getEl('form-panel').style.display = 'none';
  editingId = null;
}

document.getElementById('btn-add').addEventListener('click', openAdd);
document.getElementById('btn-cancel').addEventListener('click', hideForm);

document.getElementById('btn-save').addEventListener('click', async () => {
  const name = getEl('f-tournament').value.trim();
  if (!name) { showToast('Tournament name is required.', 'error'); return; }

  const rec = recordFromForm();
  const btn = getEl('btn-save');
  btn.disabled = true;
  btn.textContent = 'Saving…';

  try {
    if (editingId) {
      await sbFetch(`tournaments?id=eq.${editingId}`, {
        method: 'PATCH',
        body: JSON.stringify(rec)
      });
      showToast('Tournament updated.', 'success');
    } else {
      await sbFetch('tournaments', {
        method: 'POST',
        body: JSON.stringify(rec)
      });
      showToast('Tournament added.', 'success');
    }
    hideForm();
    await loadTournaments();
  } catch (err) {
    showToast('Error: ' + err.message, 'error');
  } finally {
    btn.disabled = false;
    btn.textContent = editingId ? 'Save Changes' : 'Save Tournament';
  }
});

// ── DELETE ────────────────────────────────────────────────────
function confirmDelete(id, name) {
  pendingDeleteId = id;
  getEl('confirm-msg').textContent = `"${name}" will be permanently deleted. This cannot be undone.`;
  getEl('confirm-overlay').classList.add('show');
}

getEl('btn-confirm-cancel').addEventListener('click', () => {
  getEl('confirm-overlay').classList.remove('show');
  pendingDeleteId = null;
});

getEl('btn-confirm-delete').addEventListener('click', async () => {
  if (!pendingDeleteId) return;
  getEl('confirm-overlay').classList.remove('show');
  try {
    await sbFetch(`tournaments?id=eq.${pendingDeleteId}`, { method: 'DELETE' });
    showToast('Tournament deleted.', 'success');
    await loadTournaments();
  } catch (err) {
    showToast('Error: ' + err.message, 'error');
  } finally {
    pendingDeleteId = null;
  }
});

// ── TOAST ─────────────────────────────────────────────────────
let toastTimer;
function showToast(msg, type = '') {
  const t = getEl('toast');
  t.textContent = msg;
  t.className = 'show' + (type ? ' ' + type : '');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => { t.className = ''; }, 3000);
}

// ── UTILS ─────────────────────────────────────────────────────
function escapeHTML(str) {
  return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}
function escapeAttr(str) {
  return String(str).replace(/'/g, "\\'");
}

// ── FOOTER BRAND ──────────────────────────────────────────────
(function applyFooterBrand() {
  const brand = document.getElementById('footer-brand');
  const img   = document.getElementById('footer-brand-img');
  const text  = document.getElementById('footer-brand-text');
  const src   = CONFIG.BRAND_LOGO_SRC || CONFIG.LOGO_SRC || '';
  const label = CONFIG.BRAND_LOGO_TEXT || '';
  if (src || label) {
    if (src)   { img.src = src; img.alt = label || ''; img.style.display = 'block'; }
    else         { img.style.display = 'none'; }
    if (label) { text.textContent = label; text.style.display = 'block'; }
    else         { text.style.display = 'none'; }
    brand.style.display = 'flex';
  }
})();

// ── INIT ──────────────────────────────────────────────────────
(async () => {
  const session = await getSession();
  if (session) {
    sbSession = session;
    showAdmin();
  }
})();
</script>

<footer>
  <div class="footer-brand" id="footer-brand" style="display:none;">
    <img id="footer-brand-img" src="" alt="" style="display:none;" />
    <span id="footer-brand-text" style="display:none;"></span>
  </div>
</footer>
